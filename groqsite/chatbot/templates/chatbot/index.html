{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot </title>
  <link rel="stylesheet" href="{% static 'chatbot/style.css' %}">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(-45deg, #ffe0f0, #ffd1dc, #fce1ff, #e0ffff);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating stickers */
    .sticker {
      position: absolute;
      font-size: 2rem;
      opacity: 0.8;
      animation: float 10s linear infinite;
    }

    .sticker:nth-child(1) { top: 80%; left: 10%; animation-delay: 0s; }
    .sticker:nth-child(2) { top: 90%; left: 30%; animation-delay: 2s; }
    .sticker:nth-child(3) { top: 85%; left: 50%; animation-delay: 4s; }
    .sticker:nth-child(4) { top: 95%; left: 70%; animation-delay: 6s; }
    .sticker:nth-child(5) { top: 88%; left: 85%; animation-delay: 8s; }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-300px) rotate(20deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-600px) rotate(45deg);
        opacity: 0;
      }
    }

    .container {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      color: #ff69b4;
      margin-bottom: 20px;
    }

    #chat-box {
      height: 280px;
      overflow-y: auto;
      background: #fff5f9;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid #ffc8dd;
    }

    .user, .bot {
      margin: 6px 0;
      font-size: 15px;
    }

    input[type="text"] {
      width: 70%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ffb6c1;
      margin-right: 5px;
    }

    button {
      padding: 10px 15px;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ff85c1;
    }

  </style>
</head>
<body>

  <!-- Floating pookie stickers (emoji-based) -->
  <div class="sticker">💖</div>
  <div class="sticker">✨</div>
  <div class="sticker">💫</div>
  <div class="sticker">🌸</div>
  <div class="sticker">🧸</div>

  <div class="container">
    <h1>ChatBot 🤖</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Type your message..." value="{{ user_input|default:'' }}">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="{% static 'chatbot/script.js' %}"></script>

</body>
</html>
